<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" role="img" aria-label="Ardenpay">
  <!-- Mark: two interlocking arrows forming a diamond, symbolizing on-ramp / off-ramp flow -->
  <g transform="translate(2,8)">
    <!-- Outer diamond -->
    <path d="M22 2 L42 22 L22 42 L2 22 Z" fill="none" stroke="#0B2A4A" stroke-width="1.4"/>
    <!-- Up-arrow (on-ramp) -->
    <path d="M22 8 L36 22 L28 22 L28 34 L16 34 L16 22 L8 22 Z"
          fill="#0B2A4A" opacity="0.92"/>
    <!-- Inverted small triangle accent (off-ramp) -->
    <path d="M18 22 L26 22 L22 28 Z" fill="#C9A24A"/>
  </g>
  <!-- Wordmark -->
  <text x="58" y="38"
        font-family="'Fraunces', 'Cormorant Garamond', Georgia, serif"
        font-size="26"
        font-weight="500"
        letter-spacing="0.5"
        fill="#0B2A4A">Ardenpay</text>
</svg>
